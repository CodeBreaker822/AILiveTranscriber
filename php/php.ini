[PHP]
extension_dir = "ext"
memory_limit = -1
max_execution_time = 0
max_input_time = 0
upload_max_filesize = 1024G
post_max_size = 0
display_errors = Off
log_errors = On
variables_order = "GPCS"
date.timezone = "Asia/Shanghai"

[curl]
curl.cainfo = "C:/xampp/htdocs/AITranscriber/php/extras/ssl/cacert.pem"

[openssl]
openssl.cafile = "C:/xampp/htdocs/AITranscriber/php/extras/ssl/cacert.pem"

extension=curl
extension=fileinfo
extension=mbstring
extension=openssl
extension=pdo_sqlite
extension=sqlite3

[opcache]
opcache.enable=0
opcache.enable_cli=0
