name: Release AITranscriber

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    env:
      CARGO_INCREMENTAL: "0"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $config = Get-Content -Raw src-tauri\tauri.conf.json | ConvertFrom-Json
          $version = $config.version

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "src-tauri\tauri.conf.json version must look like 1.0.1. Got: $version"
          }

          $tag = "app-v$version"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate signing secret
        shell: pwsh
        run: |
          if (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") {
            throw "Missing repository secret TAURI_SIGNING_PRIVATE_KEY."
          }

      - name: Install Node dependencies
        shell: pwsh
        run: .\node\npm.cmd ci --ignore-scripts

      - name: Install Composer dependencies
        shell: pwsh
        run: .\php\php.exe .\composer.phar install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel environment
        shell: pwsh
        run: |
          if (-not (Test-Path .env)) {
            Copy-Item .env.example .env
          }
          .\php\php.exe artisan key:generate --force

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: AITranscriber ${{ steps.release.outputs.version }}
          releaseBody: AITranscriber ${{ steps.release.outputs.version }} update.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          tauriScript: .\node\npm.cmd run tauri
          args: --config tauri.release.conf.json
